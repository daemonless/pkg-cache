# FreeBSD pkg caching proxy for pkg.FreeBSD.org.
# Master runs as root (to bind :80); workers drop to bsd.
user bsd;
worker_processes auto;
error_log /config/log/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Log each request with its cache status so you can watch hit/miss
    # (doas podman logs -f pkg-cache or inspect /config/log/access.log).
    log_format pkgcache '$remote_addr [$upstream_cache_status] "$request" $status ${body_bytes_sent}b';
    access_log /config/log/access.log pkgcache;

    # GoAccess-compatible log (stripped-down combined format — no referer/UA needed
    # for a pkg proxy).  GoAccess reads this when ENABLE_STATS=true.
    log_format goaccess '$remote_addr - - [$time_local] "$request" $status $body_bytes_sent $upstream_cache_status';
    access_log /config/log/goaccess.log goaccess;

    # On-disk cache stored under /cache. Eviction is LRU via max_size;
    # inactive only expires entries nothing has asked for in 90 days.
    proxy_cache_path /cache levels=1:2 keys_zone=pkgcache:100m
                     max_size=50g inactive=90d use_temp_path=off;

    server {
        listen 80 default_server;
        # ipv6=off: hosts without an IPv6 route to the internet otherwise stall
        # on the AAAA upstream connection ("No route to host") before falling
        # back to IPv4 — the #1 cause of intermittent slow pkg fetches.
        resolver PKG_RESOLVER valid=300s ipv6=off;

        proxy_set_header Host PKG_UPSTREAM_HOST;
        proxy_ssl_server_name on;
        proxy_ssl_name PKG_UPSTREAM_HOST;

        proxy_cache pkgcache;
        # REQUIRED: the default key is unstable with a resolver-based (dynamic)
        # proxy_pass — store/lookup keys differ and the cache silently never hits.
        proxy_cache_key "$request_uri";
        proxy_cache_lock on;                  # collapse concurrent builds onto one fetch
        # Serve cached copies through upstream outages, including 5xx responses.
        proxy_cache_use_stale error timeout updating
                              http_500 http_502 http_503 http_504;
        # Revalidate expired entries with If-Modified-Since instead of refetching.
        proxy_cache_revalidate on;
        # pkg.FreeBSD.org sends "private, no-cache, max-age=0" on everything; ignore it.
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        add_header X-Cache-Status $upstream_cache_status always;

        # Appliance landing page — static file, not templated. pkg clients use
        # ABI paths; browsers land here for operator info.
        location = / {
            root /usr/local/www/pkg-cache;
            try_files /index.html =404;
        }

        # Local healthcheck for s6 readiness and CIT.
        location = /healthz {
            default_type text/plain;
            return 200 "pkg-cache ok\n";
        }

        # Immutable package tarballs — filenames are versioned, a HIT is
        # always safe, so cache as long as anything still requests them.
        location ~* /All/.+\.pkg$ {
            proxy_cache_valid 200 365d;
            proxy_pass https://PKG_UPSTREAM_HOST$request_uri;
        }

        # Mutable catalog/metadata — keep fresh. pkg on FreeBSD 15 fetches
        # .tzst catalog names alongside the legacy .pkg/.txz ones.
        location ~* /(meta\.(conf|txz|tzst)|packagesite\.(pkg|txz|tzst)|data\.(pkg|txz|tzst))$ {
            proxy_cache_valid 200 1m;
            proxy_pass https://PKG_UPSTREAM_HOST$request_uri;
        }

        # pkg audit vulnerability database — point clients at it with
        # VULNXML_SITE=http://<cache-host>/vuxml/vuln.xml.xz
        location ^~ /vuxml/ {
            proxy_cache_valid 200 1h;
            proxy_set_header Host vuxml.freebsd.org;
            proxy_ssl_name vuxml.freebsd.org;
            rewrite ^/vuxml/(.*)$ /freebsd/$1 break;
            # Variable in the URI forces runtime DNS via the resolver (like the
            # PKG_UPSTREAM_HOST locations) so nginx starts even if vuxml.freebsd.org
            # isn't resolvable at config-load time.
            proxy_pass https://vuxml.freebsd.org$uri$is_args$args;
        }

        location / {
            proxy_cache_valid 200 10m;
            proxy_pass https://PKG_UPSTREAM_HOST$request_uri;
        }
    }

    # Optional GoAccess stats dashboard — active when ENABLE_STATS=true.
    # Visit http://<host>:7890/ — page auto-refreshes every 5 minutes.
    server {
        listen 7890;
        root /config/stats;
        index index.html;

        location = / {
            try_files /index.html @not_ready;
        }

        location @not_ready {
            return 503 "Stats not ready — set ENABLE_STATS=true and restart.\n";
        }
    }
}
